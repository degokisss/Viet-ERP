spring:
  application:
    name: module-accounting-test

  main:
    allow-bean-definition-overriding: true

  cloud:
    stream:
      enabled: false

  datasource:
    url: jdbc:postgresql://localhost:5432/vieterp
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/vieterp}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/vieterp/protocol/openid-connect/certs}

  cache:
    type: none

server:
  port: 0
